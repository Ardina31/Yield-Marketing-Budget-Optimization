<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ app_name }} — {{ app_tagline }}{% endblock %}</title>
  <meta name="csrf-token" content="{{ csrf_token() }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pages.css') }}">
  {% block extra_css %}{% endblock %}

  <script>
    window.__USER_AUTHENTICATED__ = {{ 'true' if current_user.is_authenticated else 'false' }};
    window.__INITIAL_THEME__ = {{ (current_user.theme_preference if current_user.is_authenticated else 'light')|tojson }};
  </script>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body>
  <div class="app-shell">
    <div class="sidebar-scrim"></div>
    {% include "partials/sidebar.html" %}

    <div class="shell-main">
      {% include "partials/topbar.html" %}
      <main class="main-content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <div class="toast-container"></div>
  {% include "partials/toasts.html" %}

  <script src="{{ url_for('static', filename='js/vendor/chart.umd.js') }}"></script>
  <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
