<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access denied — {{ app_name }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('yield-theme') || 'light');</script>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--color-bg); font-family:var(--font-body); color:var(--color-text-primary); margin:0; text-align:center; }
    .code { font-family:var(--font-display); font-size:5rem; font-weight:700; color:var(--color-primary); line-height:1; }
    .wrap { max-width: 420px; padding: var(--space-6); }
    p { color:var(--color-text-muted); margin: var(--space-3) 0 var(--space-6); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">403</div>
    <h1>You don't have access to this</h1>
    <p>Your role doesn't have permission to view this page. Contact an admin if you think this is a mistake.</p>
    <a class="btn btn-primary" href="/">Back to dashboard</a>
  </div>
</body>
</html>
